<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aarish — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>

  <!-- Hidden SVG arch clip-path definition (Phase 4) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <clipPath id="arch-clip" clipPathUnits="objectBoundingBox">
        <path d="M0,1 L0,0.42 C0,0.20 0.16,0.07 0.5,0 C0.84,0.07 1,0.20 1,0.42 L1,1 Z" />
      </clipPath>
    </defs>
  </svg>

  <!-- Reveal overlay — see Phase 8 -->
  <div id="reveal-overlay">
    <svg id="reveal-star" viewBox="0 0 100 100">
      <polygon points="50,8 56.89,33.37 79.70,20.30 66.63,43.11 92,50 66.63,56.89 79.70,79.70 56.89,66.63 50,92 43.11,66.63 20.30,79.70 33.37,56.89 8,50 33.37,43.11 20.30,20.30 43.11,33.37" />
    </svg>
  </div>

  <nav class="site-nav">
    <div class="nav-logo" id="nav-monogram">
      <svg viewBox="0 0 24 24">
        <path d="M9,18 L12,6 L15,18 M10.1,14.2 L13.9,14.2"
              fill="none" stroke="var(--ink)" stroke-width="1.3"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div> <!-- filled by contact.js or inline SVG, see Phase 10 -->
    <div class="nav-links">
      <a href="#work">Work</a>
      <a href="about.html">About</a>
    </div>
    <button id="contact-seal" aria-label="Contact">
      <!-- geometric seal badge, see Phase 10 -->
      <svg viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="17" fill="none" stroke="var(--ink)"
                stroke-width="1" stroke-dasharray="2.4 2.6"/>
        <path d="M15,27 L20,11 L25,27 M16.8,22.5 L23.2,22.5"
              fill="none" stroke="var(--ink)" stroke-width="1.3"
              stroke-linecap="round"/>
      </svg>
    </button>
  </nav>

  <section id="hero">
    <div class="page-frame" aria-hidden="true">
      <svg class="frame-corner corner-tl" viewBox="0 0 40 40"><path d="M2,38 Q2,2 38,2 M10,38 Q10,14 26,10" fill="none" stroke="var(--gold)" stroke-width="1"/></svg>
      <svg class="frame-corner corner-tr" viewBox="0 0 40 40"><path d="M2,38 Q2,2 38,2 M10,38 Q10,14 26,10" fill="none" stroke="var(--gold)" stroke-width="1"/></svg>
      <svg class="frame-corner corner-bl" viewBox="0 0 40 40"><path d="M2,38 Q2,2 38,2 M10,38 Q10,14 26,10" fill="none" stroke="var(--gold)" stroke-width="1"/></svg>
      <svg class="frame-corner corner-br" viewBox="0 0 40 40"><path d="M2,38 Q2,2 38,2 M10,38 Q10,14 26,10" fill="none" stroke="var(--gold)" stroke-width="1"/></svg>
    </div>

    <div class="folio-mark" aria-hidden="true">Fol. I</div>

    <svg class="hero-rosette" viewBox="0 0 400 400" aria-hidden="true">
      <g fill="none" stroke="var(--gold)" stroke-width="1">
        <circle cx="200" cy="120" r="80"/>
        <circle cx="261.7" cy="161.7" r="80"/>
        <circle cx="261.7" cy="238.3" r="80"/>
        <circle cx="200" cy="280" r="80"/>
        <circle cx="138.3" cy="238.3" r="80"/>
        <circle cx="138.3" cy="161.7" r="80"/>
        <circle cx="200" cy="200" r="80"/>
      </g>
    </svg>

    <div class="hero-content">
      <p class="hero-kicker">AI Student &amp; Builder</p>
      <h1 class="hero-name">Aarish</h1>
      <p class="hero-intro">
        I build AI systems and web tools end to end — from multi-agent
        pipelines to learning platforms — and I write about what I learn
        along the way.
      </p>
    </div>

    <div class="scroll-cue" id="scroll-cue" aria-hidden="true">
      <svg viewBox="0 0 24 36" width="20" height="32">
        <path d="M10,1 C10,1 9,18 9,24 M2,20 C5,26 9,33 10,34 C11,33 15,26 18,20"
              fill="none" stroke="var(--gold)" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </section>

  <section id="work">
    <h2 class="section-title">Selected Work</h2>
    <div id="tessellation-strip"></div>      <!-- Phase 11 -->
    <div id="project-grid"></div>            <!-- Phase 12 -->
  </section>

  <footer class="site-footer">
    <div class="footer-frieze" aria-hidden="true"></div>
    <div class="footer-content">
      <p>Aarish — built with curiosity and care.</p>
      <div class="footer-links">
        <a id="footer-email" href="#">Email</a>
        <a id="footer-github" href="#" target="_blank">GitHub</a>
        <a id="footer-linkedin" href="#" target="_blank">LinkedIn</a>
      </div>
    </div>
  </footer>

  <!-- Contact panel — see Phase 10 -->
  <div id="contact-panel">
    <button id="contact-panel-close" aria-label="Close">✕</button>
    <div id="contact-panel-content"></div>
  </div>
  <div id="contact-backdrop"></div>

  <!-- Work in Progress Banner -->
  <div class="wip-banner">Work in Progress</div>

  <script src="js/reveal.js"></script>
  <script src="js/tessellation.js"></script>
  <script src="js/card-art.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/contact.js"></script>
  <script>
    document.getElementById('scroll-cue').addEventListener('click', () => {
      document.getElementById('work').scrollIntoView({ behavior: 'smooth' });
    });
  </script>
</body>
</html>
