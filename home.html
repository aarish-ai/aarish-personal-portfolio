<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarish — Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body class="page-fade">
    <div class="home-container">
        <h1 class="greeting">As-salamu Alaykum! I am <span class="name-hl">Aarish</span>; what would you like to know about me?</h1>
        
        <div class="spacer"></div>
        
        <div class="chat-input-wrapper">
            <input type="text" id="chat-input" placeholder="/help for help" autofocus autocomplete="off" spellcheck="false">
            <div id="ghost-msg"></div>
            
            <div id="help-menu">
                <div class="help-cmd">Work</div>
                <div class="help-act">yourWork</div>
                
                <div class="help-cmd">About</div>
                <div class="help-act">aboutYou</div>
                
                <div class="help-cmd">Ideas</div>
                <div class="help-act">yourIdeas</div>
                
                <div class="help-cmd">CV</div>
                <div class="help-act">downloadCv</div>
            </div>
        </div>
    </div>
    
    <script src="js/home.js"></script>
</body>
</html>
