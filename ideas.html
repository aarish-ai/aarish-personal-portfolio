<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ideas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/ideas.css">
</head>
<body class="page-fade">
    <canvas id="islamic-bg-canvas"></canvas>
    <canvas id="ripple-bg" style="position: fixed; top:0; left:0; z-index:1; pointer-events:none;"></canvas>
    
    <a href="home.html" class="back-btn magnetic" id="back-btn">← back</a>

    <div class="ideas-container">
        <h1 class="ideas-title">Ideas</h1>
        
        <div class="ideas-grid" id="ideas-grid">
            <!-- Grid rendered dynamically -->
        </div>
    </div>
    <!-- Dim backdrop -->
    <div id="ideas-backdrop"></div>

    <!-- Expanded panel -->
    <div id="idea-expanded-panel" role="dialog" aria-modal="true">
        <button id="expanded-close-btn" class="magnetic" aria-label="Close">✕</button>
        <div id="expanded-idea-title"></div>
        <div id="expanded-idea-desc"></div>
    </div>
    
    <script src="js/islamic-bg.js"></script>
    <script src="js/ripple.js"></script>
    <script src="js/magnetic.js"></script>
    <script src="js/scramble.js"></script>
    <script src="js/cursor.js"></script>
    <script src="js/glitch.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/ideas.js"></script>
</body>
</html>
